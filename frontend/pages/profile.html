<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra | Neural Identity Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-card {
            background: rgba(15, 15, 20, 0.4);
            backdrop-filter: blur(20px);
            border: 1px border border-white/5;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .glow-identity {
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.1);
        }
    </style>
</head>
<body class="bg-obsidian text-white min-h-screen overflow-x-hidden">
    <div class="bg-noise"></div>
    <div class="scanlines"></div>

    <main class="relative z-10 flex items-center justify-center min-h-screen p-6">
        <div class="max-w-xl w-full profile-card rounded-[2.5rem] p-12 text-center reveal active glow-identity border border-white/5">
            
            <div class="relative inline-block mb-10">
                <div class="w-32 h-32 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 p-1">
                    <div id="p-avatar" class="w-full h-full rounded-full bg-obsidian flex items-center justify-center overflow-hidden">
                        <i data-lucide="user" class="w-12 h-12 text-white/10"></i>
                    </div>
                </div>
                <div class="absolute -bottom-2 -right-2 bg-cyan-400 text-obsidian px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest animate-pulse">
                    Verified
                </div>
            </div>

            <h1 id="p-name" class="text-3xl font-black uppercase tracking-tighter italic mb-2">Synchronizing...</h1>
            <p id="p-email" class="text-[10px] font-mono text-white/30 uppercase tracking-[0.3em] mb-12">Checking Neural Link...</p>

            <div class="grid grid-cols-1 gap-4 text-left">
                <div class="bg-white/5 border border-white/5 p-6 rounded-2xl">
                    <label class="text-[8px] font-mono text-cyan-400/50 uppercase tracking-[0.3em] block mb-2">Primary Identifier (User ID)</label>
                    <div class="flex items-center justify-between">
                        <code id="p-id" class="text-xs font-mono text-white/60">ID-UNDEFINED</code>
                        <button onclick="copyID()" class="text-white/20 hover:text-cyan-400 transition-colors"><i data-lucide="copy" class="w-3 h-3"></i></button>
                    </div>
                </div>

                <div class="bg-white/5 border border-white/5 p-6 rounded-2xl">
                    <label class="text-[8px] font-mono text-cyan-400/50 uppercase tracking-[0.3em] block mb-2">Auth Provider</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-3 h-3 text-cyan-400"></i>
                        <span id="p-provider" class="text-[10px] font-mono text-white/80 uppercase tracking-widest">Google Auth</span>
                    </div>
                </div>
            </div>

            <div class="mt-12 flex gap-4">
                <a href="dashboard.html" class="flex-1 py-4 bg-white/5 hover:bg-white/10 text-[10px] font-bold uppercase tracking-[0.2em] rounded-xl border border-white/5 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Return to Console
                </a>
                <button onclick="logoutHR()" class="px-8 py-4 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white text-[10px] font-bold uppercase tracking-[0.2em] rounded-xl border border-red-500/20 transition-all">
                    Sign Out
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/core/settings.js"></script>
    <script type="module">
        import { supabase } from '../js/core/supabase-client.js';
        window.supabase = supabase; // Make it globally accessible for other scripts
    </script>
    <script src="../js/pages/script.js"></script>
    <script type="module" src="../js/pages/profile.js"></script>
</body>
</html>
