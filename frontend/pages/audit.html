<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEGRA | Security Audit Logs</title>
    
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#020617', 
                        cyan: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/core/settings.js"></script>
</head>
<body class="bg-obsidian text-white relative min-h-screen">
    
    <div class="bg-noise"></div>
    <div class="grid-lines fixed inset-0 opacity-10"></div>

    <!-- Vertical Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-20 flex flex-col items-center py-8 z-[60] glass-panel border-r border-white/5 backdrop-blur-2xl bg-obsidian/40">
        <div class="mb-12">
            <div class="w-10 h-10 rounded-xl bg-cyan-400 flex items-center justify-center shadow-[0_0_20px_rgba(34,211,238,0.4)]">
                <span class="text-obsidian font-black text-xl">I</span>
            </div>
        </div>

        <nav class="flex-1 flex flex-col gap-8">
            <a href="/dashboard" class="sidebar-link hover-target" title="Console">
                <i data-lucide="terminal" class="w-5 h-5"></i>
            </a>
            <a href="/reports" class="sidebar-link hover-target" title="Archives">
                <i data-lucide="layers" class="w-5 h-5"></i>
            </a>
            <a href="/audit" class="sidebar-link active hover-target" title="Audit Logs">
                <i data-lucide="clipboard-list" class="w-5 h-5"></i>
            </a>
            <a href="/billing" class="sidebar-link hover-target" title="Billing">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
            </a>
            <a href="/llm-config" class="sidebar-link hover-target" title="Neural Engine">
                <i data-lucide="brain-circuit" class="w-5 h-5"></i>
            </a>
        </nav>

        <div class="flex flex-col gap-6 items-center">
            <a href="/profile" class="sidebar-link hover-target" title="Settings">
                <i data-lucide="settings" class="w-5 h-5 text-white/40"></i>
            </a>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-500 p-[1px] cursor-pointer hover:scale-110 transition-transform overflow-hidden" id="user-avatar">
                <div class="w-full h-full rounded-full bg-obsidian flex items-center justify-center text-[10px] font-bold uppercase">YA</div>
            </div>
            <a href="javascript:void(0)" onclick="logoutHR()" class="sidebar-link hover-target text-red-500/50 hover:text-red-500" title="Sign Out">
                <i data-lucide="power" class="w-5 h-5"></i>
            </a>
        </div>
    </aside>

    <main class="ml-20 pt-10 px-8 w-[calc(100%-5rem)] relative z-10">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-12 gap-6">
                <div>
                    <h1 class="text-4xl font-black uppercase tracking-tighter italic">Security <span class="text-cyan-400">Audit Logs</span></h1>
                    <p class="text-[10px] font-mono text-white/30 uppercase tracking-[0.4em] mt-2">Immutable Transaction Records & Security Telemetry</p>
                </div>
                <div class="flex gap-3">
                    <button id="refresh-logs" class="p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-cyan-400"></i>
                    </button>
                </div>
            </div>

            <div class="glass-panel rounded-[2.5rem] border border-white/5 overflow-hidden">
                <div class="p-8 border-b border-white/5 bg-white/[0.02] flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <i data-lucide="shield-check" class="text-cyan-400 w-5 h-5"></i>
                        <span class="text-[11px] font-mono uppercase tracking-widest text-white/60">System Events Terminal</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></div>
                        <span class="text-[8px] font-mono uppercase tracking-widest text-cyan-400">Live Monitoring</span>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-white/5 bg-white/[0.01]">
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Timestamp</th>
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Severity</th>
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Action</th>
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Resource</th>
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Details</th>
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Agent</th>
                                <th class="p-6 text-[9px] font-mono text-white/20 uppercase tracking-[0.2em]">Origin (IP)</th>
                            </tr>
                        </thead>
                        <tbody id="audit-logs-body" class="divide-y divide-white/5">
                            <!-- Populated via JS -->
                            <tr>
                                <td colspan="5" class="p-20 text-center opacity-20">
                                    <div class="flex flex-col items-center gap-4">
                                        <div class="animate-spin w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full"></div>
                                        <p class="text-[10px] font-mono uppercase tracking-[0.3em]">Querying Encrypted Vault...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="p-6 border-t border-white/5 bg-white/[0.01] flex items-center justify-between">
                    <p class="text-[8px] font-mono text-white/20 uppercase tracking-widest">Authorized Personnel Only • Audit V2.1</p>
                    <div class="flex gap-2">
                        <button id="prev-page" class="p-2 hover:bg-white/5 rounded-lg disabled:opacity-20"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button id="next-page" class="p-2 hover:bg-white/5 rounded-lg disabled:opacity-20"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Core Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from '/js/core/supabase-client.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = '/';
            
            lucide.createIcons();
            
            // Logout handler
            window.logoutHR = async () => {
                await supabase.auth.signOut();
                window.location.href = '/';
            };
        });
    </script>
    <script type="module" src="/js/pages/audit.js"></script>
</body>
</html>
