<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra | Secure Access Node</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#020617', // Extremely dark blue/black
                        cyan: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-obsidian text-white relative min-h-screen flex items-center justify-center">

    <!-- Cinematic Overlays -->
    <div class="bg-noise"></div>
    <div class="scanlines"></div>
    <div class="grid-lines fixed inset-0 opacity-40"></div>
    
    <!-- Custom Cursor -->
    <div class="custom-cursor hidden md:block" id="cursor"></div>

    <!-- Return Link -->
    <a href="index.html" class="absolute top-10 left-10 text-[10px] uppercase font-mono tracking-widest text-white/50 hover:text-white transition-colors flex items-center gap-2 hover-target z-50">
        <i data-lucide="arrow-left" class="w-4 h-4 text-red-500"></i> Abort / Return to Main
    </a>

    <!-- Auth Container -->
    <div class="glass-panel w-full max-w-lg rounded-xl p-10 mx-4 relative border border-white/10 shadow-[0_0_80px_rgba(239,68,68,0.05)] z-10">
        <p class="text-red-500 text-xs font-mono tracking-widest uppercase mb-4">[ SECURE ACCESS ]</p>
        <h2 class="text-3xl font-bold mb-8 tracking-tighter uppercase glitch" data-text="ACCESS NODE">ACCESS NODE</h2>
        
        <form onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-mono text-white/30 uppercase tracking-widest mb-3">Corporate Email</label>
                    <input type="email" class="input-field w-full bg-white/[0.02] border border-white/10 rounded-sm p-4 text-sm text-white focus:border-red-500 outline-none transition-all duration-300" placeholder="operator@company.com" required>
                </div>
                <div>
                    <label class="block text-[10px] font-mono text-white/30 uppercase tracking-widest mb-3">Security Key</label>
                    <input type="password" class="input-field w-full bg-white/[0.02] border border-white/10 rounded-sm p-4 text-sm text-white focus:border-red-500 outline-none transition-all duration-300" placeholder="••••••••••••" required>
                </div>
                <button type="submit" class="w-full py-4 mt-4 bg-white text-black text-xs uppercase tracking-widest font-bold hover:bg-red-500 hover:text-white hover:shadow-[0_0_20px_rgba(239,68,68,0.4)] transition-all duration-300 rounded-sm">Authenticate Identity</button>
            </div>
        </form>

        <div class="mt-8">
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="flex-shrink-0 mx-6 text-white/20 text-[10px] font-mono uppercase tracking-widest">Or verify via</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>
            <button type="button" class="group w-full py-4 mt-4 border border-dashed border-white/20 hover:border-red-500 hover:text-red-500 transition-colors rounded-sm flex justify-center items-center gap-3 text-xs uppercase tracking-widest font-bold text-white/50">
                <i data-lucide="fingerprint" class="w-4 h-4 group-hover:animate-pulse"></i> Behavioral Biometrics
            </button>
        </div>
        
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
