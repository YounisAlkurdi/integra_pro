# ============================================================
# Integra Neural Engine — Production (AWS EC2)
# ============================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: integra_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - integra-backend

  integra-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: integra_core_engine
    expose:
      - "8000" # Expose internally for Caddy, do not bind to host
    env_file:
      - .env
    volumes:
      # Create a named volume for model caching on EC2
      - model_cache_vol:/root/.cache
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  model_cache_vol:
  caddy_data:
  caddy_config:
