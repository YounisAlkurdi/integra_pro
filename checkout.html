<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra | Secure Checkout Node</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#020617',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-obsidian text-white relative min-h-screen flex items-center justify-center">

    <!-- Cinematic Overlays -->
    <div class="bg-noise"></div>
    <div class="scanlines"></div>
    <div class="grid-lines fixed inset-0 opacity-40"></div>
    
    <!-- Custom Cursor -->
    <div class="custom-cursor hidden md:block" id="cursor"></div>

    <!-- Return Link -->
    <a href="index.html" class="absolute top-10 left-10 text-[10px] uppercase font-mono tracking-widest text-white/50 hover:text-white transition-colors flex items-center gap-2 hover-target z-50">
        <i data-lucide="arrow-left" class="w-4 h-4 text-cyan-400"></i> Abort / Return to Main
    </a>

    <!-- Checkout Container -->
    <div class="glass-panel w-full max-w-xl rounded-xl p-10 mx-4 relative border border-white/10 shadow-[0_0_80px_rgba(34,211,238,0.05)] z-10 reveal active">
        <p class="text-cyan-400 text-xs font-mono tracking-widest uppercase mb-4">[ INITIALIZE DEPLOYMENT ]</p>
        <h2 class="text-3xl font-bold mb-2 tracking-tighter uppercase glitch" data-text="SECURE CHECKOUT">SECURE CHECKOUT</h2>
        <p class="text-white/30 text-sm font-light mb-8 flex items-center gap-2">
            <i data-lucide="lock" class="w-3 h-3 text-cyan-400"></i> Encrypted processing via AES-256
        </p>

        <form onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-mono text-white/30 uppercase tracking-widest mb-3">Cardholder Name</label>
                    <input type="text" class="input-field w-full bg-white/[0.02] border border-white/10 rounded-sm p-4 text-sm text-white focus:border-cyan-400 outline-none transition-all" placeholder="JANE DOE" required>
                </div>
                <div>
                    <label class="block text-[10px] font-mono text-white/30 uppercase tracking-widest mb-3">Card Number</label>
                    <div class="relative">
                        <input type="text" class="input-field w-full bg-white/[0.02] border border-white/10 rounded-sm p-4 pl-12 text-sm text-white focus:border-cyan-400 outline-none font-mono transition-all" placeholder="0000 0000 0000 0000" maxlength="19" required>
                        <i data-lucide="credit-card" class="absolute left-4 top-4 text-white/30 w-5 h-5"></i>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-mono text-white/30 uppercase tracking-widest mb-3">Expiry Date</label>
                        <input type="text" class="input-field w-full bg-white/[0.02] border border-white/10 rounded-sm p-4 text-sm text-white focus:border-cyan-400 outline-none font-mono transition-all" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-mono text-white/30 uppercase tracking-widest mb-3">CVC</label>
                        <input type="password" class="input-field w-full bg-white/[0.02] border border-white/10 rounded-sm p-4 text-sm text-white focus:border-cyan-400 outline-none font-mono transition-all" placeholder="•••" maxlength="4" required>
                    </div>
                </div>
                
                <div class="pt-6 border-t border-white/5 mt-8">
                    <button type="submit" class="w-full py-4 bg-cyan-400 text-obsidian text-sm uppercase tracking-widest font-bold hover:bg-white hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] transition-all rounded-sm">Confirm Purchase</button>
                </div>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
