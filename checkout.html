<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra | Secure Neural Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { obsidian: '#020617', cyan: { 400: '#22d3ee' } },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], mono: ['"Space Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout-card.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-obsidian text-white relative min-h-screen flex items-center justify-center overflow-hidden">
    <div class="bg-noise"></div>
    <div class="scanlines"></div>
    <div class="grid-lines fixed inset-0 opacity-20"></div>

    <a href="index.html" class="absolute top-10 left-10 text-[10px] uppercase font-mono tracking-[0.4em] text-white/40 hover:text-cyan-400 transition-all z-50 flex items-center gap-2">
        <i data-lucide="arrow-left" class="w-4 h-4 text-cyan-400"></i> ABORT / RETURN
    </a>

    <div class="container max-w-6xl mx-auto p-6 lg:p-12 z-10 relative flex flex-col lg:grid lg:grid-cols-2 gap-16">
        <!-- Visual Proxy -->
        <div class="flex flex-col items-center lg:items-start pt-10">
            <div class="mb-12">
                <p class="text-cyan-400 text-[10px] font-mono tracking-[0.5em] uppercase mb-4 opacity-70">/ SECURE ENCRYPTION NODE</p>
                <h2 class="text-5xl font-black tracking-tighter uppercase glitch" data-text="NEURAL CARD">NEURAL CARD</h2>
            </div>

            <div class="card-container lg:scale-[1.1] origin-left">
                <div class="card-inner" id="card-inner">
                    <div class="card-front overflow-hidden p-8 backdrop-blur-3xl border border-white/10">
                        <div class="card-texture"></div>
                        <div class="card-flare"></div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div class="flex justify-between items-start">
                                <span class="font-mono text-[11px] font-bold tracking-tighter uppercase">Integra<span class="text-cyan-400">Core</span></span>
                                <span class="text-[8px] font-mono opacity-20 uppercase tracking-widest">Gen-IV Link</span>
                            </div>
                            <div class="flex flex-col gap-3">
                                <div class="card-chip w-10 h-8"></div>
                                <div id="card-number-display" class="text-lg font-mono tracking-[0.25em]">0000 0000 0000 0000</div>
                            </div>
                            <div class="flex justify-between items-end border-t border-white/5 pt-4">
                                <p id="card-holder-display" class="text-[12px] font-bold tracking-[0.3em] font-mono uppercase text-white/90">JANE DOE</p>
                                <div class="flex -space-x-3 opacity-60">
                                    <div class="w-6 h-6 rounded-full bg-cyan-400/20 border border-cyan-400/30"></div>
                                    <div class="w-6 h-6 rounded-full bg-white/10 border border-white/20"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-back p-8 backdrop-blur-3xl border border-white/10">
                        <div class="w-full h-10 bg-black/90 -mx-8 mt-4"></div>
                        <div class="flex justify-between items-center mt-12 bg-white/[0.03] p-4 rounded border border-white/5">
                            <span id="card-expiry-display" class="text-xs font-mono text-cyan-400">MM/YY</span>
                            <span id="card-cvc-display" class="text-sm font-mono tracking-widest">•••</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Payment Interface -->
        <div class="glass-panel p-10 rounded-3xl border border-white/10 bg-white/[0.01]">
            <div class="mb-12">
                <label class="block text-[10px] font-mono text-white/20 uppercase tracking-[0.3em] mb-6">Service Cycle</label>
                <div class="grid grid-cols-2 gap-4">
                    <!-- Monthly -->
                    <div id="billing-monthly" class="billing-card p-6 rounded-2xl border-2 border-white/5 bg-white/[0.01] cursor-pointer hover:border-white/20 transition-all group active-billing" onclick="selectBilling('monthly')">
                        <div class="flex justify-between items-start mb-6">
                            <div class="radio-button w-5 h-5 rounded-full border-2 border-white/20 flex items-center justify-center group-[.active-billing]:border-cyan-400">
                                <div class="radio-inner w-2.5 h-2.5 rounded-full bg-cyan-400 opacity-0 group-[.active-billing]:opacity-100 transition-opacity"></div>
                            </div>
                        </div>
                        <h4 class="text-lg font-bold text-white mb-1">Monthly</h4>
                        <p class="text-[10px] font-mono text-white/40 uppercase tracking-widest" id="monthly-price-display">$0.00 / mo</p>
                    </div>

                    <!-- Yearly -->
                    <div id="billing-yearly" class="billing-card p-6 rounded-2xl border-2 border-white/5 bg-white/[0.01] cursor-pointer hover:border-white/20 transition-all group relative" onclick="selectBilling('yearly')">
                        <div class="absolute top-4 right-4 text-[8px] font-bold bg-cyan-400 text-obsidian px-2 py-0.5 rounded uppercase tracking-tighter">Save 20%</div>
                        <div class="flex justify-between items-start mb-6">
                            <div class="radio-button w-5 h-5 rounded-full border-2 border-white/20 flex items-center justify-center group-[.active-billing]:border-cyan-400">
                                <div class="radio-inner w-2.5 h-2.5 rounded-full bg-cyan-400 opacity-0 group-[.active-billing]:opacity-100 transition-opacity"></div>
                            </div>
                        </div>
                        <h4 class="text-lg font-bold text-white mb-1">Yearly</h4>
                        <p class="text-[10px] font-mono text-white/40 uppercase tracking-widest" id="yearly-price-display">$0.00 / yr</p>
                    </div>
                </div>
            </div>

            <form id="payment-form" class="space-y-8">
                <div class="group">
                    <label class="block text-[10px] font-mono text-white/20 uppercase tracking-[0.3em] mb-4">Operator Profile</label>
                    <input type="text" id="card-holder-name" class="w-full bg-white/[0.03] border border-white/10 rounded-lg p-5 text-sm text-white focus:border-cyan-400 outline-none transition-all" placeholder="JANE DOE" required>
                </div>

                <div class="group">
                    <label class="block text-[10px] font-mono text-white/20 uppercase tracking-[0.3em] mb-4">Neural Payment Node</label>
                    <div id="card-element" class="w-full bg-white/[0.03] border border-white/10 rounded-lg p-5 transition-all">
                        <!-- Stripe Elements Mounts Here -->
                    </div>
                    <div id="card-errors" class="mt-4 text-[10px] font-mono text-red-500 uppercase tracking-widest" role="alert"></div>
                </div>

                <div class="pt-6">
                    <button id="submit-button" type="submit" class="w-full py-6 bg-cyan-400 text-obsidian text-xs uppercase tracking-[0.5em] font-black hover:bg-white transition-all rounded-xl relative overflow-hidden group shadow-[0_0_40px_rgba(34,211,238,0.2)]">
                        <span class="relative z-10">Confirm Secure Transaction</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/50 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                    </button>
                    <p class="text-[8px] font-mono text-center text-white/10 uppercase tracking-widest mt-6">RSA-4096 / SECURE LINK ACTIVE</p>
                </div>
            </form>
        </div>
    </div>

    <script src="settings.js"></script>
    <script src="checkout.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
