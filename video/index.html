<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra AI - Identity Verification UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Base Project Layer Isolation (From scroll-frame.md) */
        body {
            background-color: #000000;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .scroll-container {
            height: 750vh; /* Smooth scrubbing distance (Matches 5000px logic) */
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* GPU Promotion */
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
            will-change: transform;
        }

        /* 2. Responsive Framing + Skill Details (From responsive-video-framing.md & video-scroll-engine.md) */
        .integra-video-frame {
            position: relative;
            width: 100%;
            max-width: 80rem; /* 5xl */
            aspect-ratio: 16 / 9;
            overflow: hidden;
            /* Modern "App Frame" look: clip-path + round 2rem */
            clip-path: inset(0% round 2rem);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: #000;
            /* Performance containment */
            contain: layout style paint;
            transform: translateZ(0);
        }

        #scrollVideo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            /* Prevents black bars */
            object-fit: cover;
            display: block;
            /* Optimization: gpu layer isolation */
            will-change: transform, contents;
            /* Prevents accidental clicks on video during scroll */
            pointer-events: none;
            /* Initial state */
            transition: filter 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="sticky-wrapper">
            <div class="integra-video-frame">
                <!-- Optimal video configuration (From all guides) -->
                <video 
                    id="scrollVideo"
                    muted 
                    playsinline 
                    webkit-playsinline
                    preload="auto"
                >
                    <source src="face.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        /**
         * Skill Implementation for Integra Scroll-Reveal 
         * Merged logic from video-scroll-engine.md + scroll-frame.md
         */
        const scrollEngine = {
            settings: {
                lerpFactor: 0.06,      // Sweet spot for "Apple-level" smoothness
                threshold: 0.0001      // Stop animation when delta is negligible
            },
            
            state: {
                targetTime: 0,
                currentTime: 0,
                isAnimating: false,
                duration: 0,
                maxScroll: 0
            },

            init(videoId) {
                this.video = document.getElementById(videoId);
                
                if (this.video.readyState >= 1) {
                    this.setup();
                } else {
                    this.video.addEventListener('loadedmetadata', () => this.setup());
                }
            },

            setup() {
                this.state.duration = this.video.duration;
                this.updateMaxScroll();
                this.setupListeners();
                
                // Initial sync
                this.syncTarget();
                this.render();
            },

            updateMaxScroll() {
                this.state.maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            },

            setupListeners() {
                // Passive listener for peak scroll performance
                window.addEventListener('scroll', () => this.syncTarget(), { passive: true });
                
                // Handle resize
                window.addEventListener('resize', () => {
                    this.updateMaxScroll();
                    this.syncTarget();
                });
            },

            syncTarget() {
                const scrollPercent = window.scrollY / this.state.maxScroll;
                this.state.targetTime = scrollPercent * (this.state.duration || 0);
                
                if (!this.state.isAnimating) {
                    this.state.isAnimating = true;
                    requestAnimationFrame(() => this.render());
                }
            },

            render() {
                const delta = this.state.targetTime - this.state.currentTime;
                
                // Apply Linear Interpolation (LERP)
                this.state.currentTime += delta * this.settings.lerpFactor;

                // Sync the actual video time
                if (this.video.readyState >= 2 && Math.abs(this.video.currentTime - this.state.currentTime) > 0.001) {
                    this.video.currentTime = this.state.currentTime;
                }

                if (Math.abs(delta) > this.settings.threshold) {
                    requestAnimationFrame(() => this.render());
                } else {
                    this.state.isAnimating = false;
                }
            }
        };

        // Start Engine
        scrollEngine.init('scrollVideo');
    </script>
</body>
</html>
